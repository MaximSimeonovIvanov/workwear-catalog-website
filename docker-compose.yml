services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: workwear
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - workwear-network

  backend:
    build: ./backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - workwear-network

  frontend:
    build: ./frontend
    restart: unless-stopped
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3002:3000"
    env_file:
      - .env
    networks:
      - workwear-network

networks:
  workwear-network:
    driver: bridge

volumes:
  pgdata:
